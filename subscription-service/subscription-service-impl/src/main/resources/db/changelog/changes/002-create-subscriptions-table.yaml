databaseChangeLog:
  - changeSet:
      id: 002-create-subscriptions-table
      author: fitnessapp
      changes:
        - createTable:
            tableName: subscriptions
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: BIGINT }
              - column: { name: user_email, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: plan_id, type: BIGINT }
              - column: { name: start_date, type: DATE }
              - column: { name: end_date, type: DATE }
              - column: { name: status, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: transaction_ref, type: VARCHAR(255) }
              - column: { name: created_at, type: DATETIME }
              - column: { name: updated_at, type: DATETIME }
        - addForeignKeyConstraint:
            baseTableName: subscriptions
            baseColumnNames: plan_id
            referencedTableName: subscription_plans
            referencedColumnNames: id
            constraintName: fk_subscriptions_plan
        - createIndex:
            tableName: subscriptions
            indexName: idx_subscriptions_user_email
            columns:
              - column: { name: user_email }
        - createIndex:
            tableName: subscriptions
            indexName: idx_subscriptions_status
            columns:
              - column: { name: status }

