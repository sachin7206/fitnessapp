databaseChangeLog:
  - changeSet:
      id: 003-seed-subscription-plans
      author: fitnessapp
      changes:
        - insert:
            tableName: subscription_plans
            columns:
              - column: { name: name, value: "Starter Plan" }
              - column: { name: description, value: "Perfect for beginners. Get personalized AI workout plans, basic nutrition guidance, and progress tracking for 1 month." }
              - column: { name: duration_months, valueNumeric: 1 }
              - column: { name: price, valueNumeric: 299.00 }
              - column: { name: currency, value: "INR" }
              - column: { name: features, value: '["AI Workout Plans","Basic Nutrition Plans","Progress Tracking","Step Counter"]' }
              - column: { name: is_active, valueBoolean: true }
              - column: { name: created_at, valueComputed: "NOW()" }
        - insert:
            tableName: subscription_plans
            columns:
              - column: { name: name, value: "Pro Plan" }
              - column: { name: description, value: "Our most popular plan! 3 months of full access including AI-powered workout & nutrition plans, regional cuisine support, community features, and premium content." }
              - column: { name: duration_months, valueNumeric: 3 }
              - column: { name: price, valueNumeric: 699.00 }
              - column: { name: currency, value: "INR" }
              - column: { name: features, value: '["AI Workout Plans","AI Nutrition Plans","Regional Cuisine Support","Progress Tracking","Step Counter","Community Challenges","Wellness Tools","Priority Support"]' }
              - column: { name: is_active, valueBoolean: true }
              - column: { name: created_at, valueComputed: "NOW()" }
        - insert:
            tableName: subscription_plans
            columns:
              - column: { name: name, value: "Elite Plan" }
              - column: { name: description, value: "Best value! 6 months of unlimited access with personal coaching, advanced analytics, meal delivery integration, and all Pro features." }
              - column: { name: duration_months, valueNumeric: 6 }
              - column: { name: price, valueNumeric: 1199.00 }
              - column: { name: currency, value: "INR" }
              - column: { name: features, value: '["Everything in Pro","Personal AI Coach","Advanced Analytics","Meal Delivery Integration","Custom Workout Builder","1-on-1 Expert Sessions","Early Feature Access"]' }
              - column: { name: is_active, valueBoolean: true }
              - column: { name: created_at, valueComputed: "NOW()" }


