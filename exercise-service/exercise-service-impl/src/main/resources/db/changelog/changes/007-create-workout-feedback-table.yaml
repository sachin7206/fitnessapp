databaseChangeLog:
  - changeSet:
      id: 007-create-workout-feedback-table
      author: fitnessapp
      changes:
        - createTable:
            tableName: workout_feedback
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_email, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: workout_plan_id, type: BIGINT }
              - column: { name: difficulty, type: VARCHAR(20) }
              - column: { name: energy_level, type: INT, defaultValueNumeric: 5 }
              - column: { name: completion_percentage, type: INT, defaultValueNumeric: 100 }
              - column: { name: notes, type: VARCHAR(500) }
              - column: { name: created_at, type: DATETIME }
        - createIndex:
            tableName: workout_feedback
            indexName: idx_workout_feedback_user
            columns:
              - column: { name: user_email }
              - column: { name: workout_plan_id }

