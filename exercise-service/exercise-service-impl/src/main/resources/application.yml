server:
  port: 8083

spring:
  application:
    name: exercise-service
  datasource:
    url: jdbc:mysql://localhost:3306/fitnessapp_exercises?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-env-variable}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: false

logging:
  level:
    root: INFO
    com.fitnessapp: DEBUG

gemini:
  api:
    key: ${GEMINI_API_KEYS:}
    url: https://generativelanguage.googleapis.com/v1beta/models
  model: gemini-2.0-flash
  enabled: true
  timeout:
    connect: 10000
    read: 60000

