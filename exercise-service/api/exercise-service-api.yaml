openapi: 3.0.3
info:
  title: Exercise Service API
  description: API for exercises, workout plans, and step tracking
  version: 1.0.0

paths:
  /exercises:
    get:
      tags: [Exercise]
      operationId: getAllExercises
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: difficulty
          in: query
          schema: { type: string }
        - name: culturalOrigin
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Exercises retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListExerciseDTO'

  /exercises/{id}:
    get:
      tags: [Exercise]
      operationId: getExerciseById
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Exercise retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseExerciseDTO'

  /workouts/generate-plan:
    post:
      tags: [Workout]
      operationId: generatePlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateWorkoutPlanRequest'
      responses:
        '200':
          description: Plan generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutPlanDTO'

  /workouts/plans/{planId}/assign:
    post:
      tags: [Workout]
      operationId: assignPlan
      parameters:
        - name: planId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Plan assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWorkoutPlanDTO'

  /workouts/my-plan:
    get:
      tags: [Workout]
      operationId: getActivePlan
      responses:
        '200':
          description: Active plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWorkoutPlanDTO'
    delete:
      tags: [Workout]
      operationId: cancelPlan
      responses:
        '200':
          description: Plan cancelled

  /workouts/my-plan/complete:
    post:
      tags: [Workout]
      operationId: markComplete
      responses:
        '200':
          description: Workout marked complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWorkoutPlanDTO'

  /workouts/workout-count:
    get:
      tags: [Workout]
      operationId: getWorkoutCount
      responses:
        '200':
          description: Workout count
          content:
            application/json:
              schema:
                type: object

  /workouts/motivational-quote:
    get:
      tags: [Workout]
      operationId: getMotivationalQuote
      responses:
        '200':
          description: Quote
          content:
            application/json:
              schema:
                type: object

  /workouts/steps/today:
    get:
      tags: [Workout]
      operationId: getTodaySteps
      responses:
        '200':
          description: Today steps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyStepTrackingDTO'
    put:
      tags: [Workout]
      operationId: syncSteps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StepTrackingSyncRequest'
      responses:
        '200':
          description: Steps synced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyStepTrackingDTO'

  /workouts/steps/history:
    get:
      tags: [Workout]
      operationId: getStepHistory
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 90 }
      responses:
        '200':
          description: Step history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyStepTrackingDTO'

  /health:
    get:
      tags: [Health]
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object

components:
  schemas:
    ExerciseDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name:
          type: object
          additionalProperties: { type: string }
        description:
          type: object
          additionalProperties: { type: string }
        category: { type: string }
        difficulty: { type: string }
        caloriesBurnedPerMin: { type: number, format: double }
        equipment:
          type: array
          items: { type: string }
        videoUrl: { type: string }
        thumbnailUrl: { type: string }
        culturalOrigin: { type: string }
        muscleGroups:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }

    ApiResponseListExerciseDTO:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        data:
          type: array
          items:
            $ref: '#/components/schemas/ExerciseDTO'

    ApiResponseExerciseDTO:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        data:
          $ref: '#/components/schemas/ExerciseDTO'

    GenerateWorkoutPlanRequest:
      type: object
      properties:
        daysPerWeek: { type: integer }
        exerciseType: { type: string }
        exerciseTime: { type: string }
        durationMinutes: { type: integer }
        goal: { type: string }
        difficulty: { type: string }
        includeCardio: { type: boolean }
        cardioType: { type: string }
        cardioDurationMinutes: { type: integer }
        cardioSteps: { type: integer }
        focusMuscleGroups:
          type: array
          items: { type: string }

    WorkoutPlanDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        userId: { type: integer, format: int64 }
        planName: { type: string }
        planType: { type: string }
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/WorkoutExerciseDTO'
        frequency: { type: string }
        difficulty: { type: string }
        durationWeeks: { type: integer }
        isActive: { type: boolean }
        exerciseType: { type: string }
        exerciseTime: { type: string }
        exerciseDurationMinutes: { type: integer }
        goal: { type: string }
        daysPerWeek: { type: integer }
        caloriesPerSession: { type: integer }
        cardioType: { type: string }
        cardioDurationMinutes: { type: integer }
        cardioSteps: { type: integer }
        cardioCalories: { type: integer }
        isTemplate: { type: boolean }

    WorkoutExerciseDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        exerciseId: { type: integer, format: int64 }
        exerciseName: { type: string }
        sets: { type: integer }
        reps: { type: integer }
        durationSeconds: { type: integer }
        restTimeSeconds: { type: integer }
        order: { type: integer }
        dayOfWeek: { type: string }
        muscleGroup: { type: string }
        caloriesBurned: { type: integer }
        isCardio: { type: boolean }
        steps: { type: integer }

    UserWorkoutPlanDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        userEmail: { type: string }
        workoutPlan:
          $ref: '#/components/schemas/WorkoutPlanDTO'
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        status: { type: string }
        completedWorkouts: { type: integer }
        totalWorkouts: { type: integer }
        currentWeek: { type: integer }
        scheduledForTomorrow: { type: boolean }

    DailyStepTrackingDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        userEmail: { type: string }
        trackingDate: { type: string, format: date }
        steps: { type: integer }
        stepGoal: { type: integer }
        caloriesBurned: { type: integer }
        goalCompleted: { type: boolean }

    StepTrackingSyncRequest:
      type: object
      properties:
        steps: { type: integer }
        stepGoal: { type: integer }
        goalCompleted: { type: boolean }
