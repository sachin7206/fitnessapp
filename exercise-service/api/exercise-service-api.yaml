openapi: 3.0.3
info:
  title: Exercise Service API
  description: API for exercises, workout plans, and step tracking
  version: 1.0.0

paths:
  /exercises:
    get:
      tags: [Exercise]
      operationId: getAllExercises
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: difficulty
          in: query
          schema: { type: string }
        - name: culturalOrigin
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Exercises retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListExerciseDTO'

  /exercises/{id}:
    get:
      tags: [Exercise]
      operationId: getExerciseById
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Exercise retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseExerciseDTO'

  /workouts/generate-plan:
    post:
      tags: [Workout]
      operationId: generatePlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateWorkoutPlanRequest'
      responses:
        '200':
          description: Plan generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutPlanDTO'

  /workouts/plans/{planId}/assign:
    post:
      tags: [Workout]
      operationId: assignPlan
      parameters:
        - name: planId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Plan assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWorkoutPlanDTO'

  /workouts/my-plan:
    get:
      tags: [Workout]
      operationId: getActivePlan
      responses:
        '200':
          description: Active plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWorkoutPlanDTO'
    delete:
      tags: [Workout]
      operationId: cancelPlan
      responses:
        '200':
          description: Plan cancelled

  /workouts/my-plan/complete:
    post:
      tags: [Workout]
      operationId: markComplete
      responses:
        '200':
          description: Workout marked complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWorkoutPlanDTO'

  /workouts/workout-count:
    get:
      tags: [Workout]
      operationId: getWorkoutCount
      responses:
        '200':
          description: Workout count
          content:
            application/json:
              schema:
                type: object

  /workouts/motivational-quote:
    get:
      tags: [Workout]
      operationId: getMotivationalQuote
      responses:
        '200':
          description: Quote
          content:
            application/json:
              schema:
                type: object

  /workouts/steps/today:
    get:
      tags: [Workout]
      operationId: getTodaySteps
      responses:
        '200':
          description: Today steps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyStepTrackingDTO'
    put:
      tags: [Workout]
      operationId: syncSteps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StepTrackingSyncRequest'
      responses:
        '200':
          description: Steps synced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyStepTrackingDTO'

  /workouts/steps/history:
    get:
      tags: [Workout]
      operationId: getStepHistory
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 90 }
      responses:
        '200':
          description: Step history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyStepTrackingDTO'

  /workouts/my-plan/substitute:
    post:
      tags: [Workout]
      operationId: suggestExerciseSubstitutes
      summary: Get exercise substitution suggestions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExerciseSubstitutionRequestDTO'
      responses:
        '200':
          description: Exercise alternatives
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseSubstitutionResponseDTO'

  /workouts/my-plan/feedback:
    post:
      tags: [Workout]
      operationId: submitWorkoutFeedback
      summary: Submit post-workout feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkoutFeedbackRequest'
      responses:
        '200':
          description: Feedback recorded
          content:
            application/json:
              schema:
                type: object

  /workouts/my-plan/adjust:
    post:
      tags: [Workout]
      operationId: adjustWorkoutProgression
      summary: Get AI-adjusted workout based on feedback
      responses:
        '200':
          description: Adjusted workout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutAdjustmentResponseDTO'

  /workouts/my-plan/feedback/history:
    get:
      tags: [Workout]
      operationId: getWorkoutFeedbackHistory
      responses:
        '200':
          description: Feedback history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkoutFeedbackDTO'

  /workouts/custom-plan:
    post:
      tags: [Workout]
      operationId: saveCustomPlan
      summary: Save a user-created custom workout plan (free service)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomWorkoutPlanRequest'
      responses:
        '200':
          description: Custom plan saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutPlanDTO'

  /workouts/custom-plan/exercises/{exerciseId}:
    put:
      tags: [Workout]
      operationId: updateExercise
      summary: Update a single exercise in-place (sets, reps, weight, rest, setDetailsJson)
      parameters:
        - name: exerciseId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExerciseRequest'
      responses:
        '200':
          description: Exercise updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutExerciseDTO'

  /workouts/custom-plan/log:
    put:
      tags: [Workout]
      operationId: syncCustomWorkoutLog
      summary: Sync exercise set/rep/weight logs for custom plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomWorkoutLogSyncRequest'
      responses:
        '200':
          description: Logs synced
          content:
            application/json:
              schema:
                type: object
    get:
      tags: [Workout]
      operationId: getCustomWorkoutLogs
      summary: Get exercise logs for custom workout
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 30 }
      responses:
        '200':
          description: Exercise logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomWorkoutLogDTO'

  /health:
    get:
      tags: [Health]
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object

components:
  schemas:
    ExerciseDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name:
          type: object
          additionalProperties: { type: string }
        description:
          type: object
          additionalProperties: { type: string }
        category: { type: string }
        difficulty: { type: string }
        caloriesBurnedPerMin: { type: number, format: double }
        equipment:
          type: array
          items: { type: string }
        videoUrl: { type: string }
        thumbnailUrl: { type: string }
        culturalOrigin: { type: string }
        muscleGroups:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }

    ApiResponseListExerciseDTO:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        data:
          type: array
          items:
            $ref: '#/components/schemas/ExerciseDTO'

    ApiResponseExerciseDTO:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        data:
          $ref: '#/components/schemas/ExerciseDTO'

    GenerateWorkoutPlanRequest:
      type: object
      properties:
        daysPerWeek: { type: integer }
        exerciseType: { type: string }
        exerciseTime: { type: string }
        durationMinutes: { type: integer }
        goal: { type: string }
        difficulty: { type: string }
        includeCardio: { type: boolean }
        cardioType: { type: string }
        cardioDurationMinutes: { type: integer }
        cardioSteps: { type: integer }
        focusMuscleGroups:
          type: array
          items: { type: string }

    WorkoutPlanDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        userId: { type: integer, format: int64 }
        planName: { type: string }
        planType: { type: string }
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/WorkoutExerciseDTO'
        frequency: { type: string }
        difficulty: { type: string }
        durationWeeks: { type: integer }
        isActive: { type: boolean }
        exerciseType: { type: string }
        exerciseTime: { type: string }
        exerciseDurationMinutes: { type: integer }
        goal: { type: string }
        daysPerWeek: { type: integer }
        caloriesPerSession: { type: integer }
        cardioType: { type: string }
        cardioDurationMinutes: { type: integer }
        cardioSteps: { type: integer }
        cardioCalories: { type: integer }
        isTemplate: { type: boolean }

    WorkoutExerciseDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        exerciseId: { type: integer, format: int64 }
        exerciseName: { type: string }
        sets: { type: integer }
        reps: { type: integer }
        durationSeconds: { type: integer }
        restTimeSeconds: { type: integer }
        order: { type: integer }
        dayOfWeek: { type: string }
        muscleGroup: { type: string }
        caloriesBurned: { type: integer }
        isCardio: { type: boolean }
        steps: { type: integer }

    UserWorkoutPlanDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        userEmail: { type: string }
        workoutPlan:
          $ref: '#/components/schemas/WorkoutPlanDTO'
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        status: { type: string }
        completedWorkouts: { type: integer }
        totalWorkouts: { type: integer }
        currentWeek: { type: integer }
        scheduledForTomorrow: { type: boolean }

    DailyStepTrackingDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        userEmail: { type: string }
        trackingDate: { type: string, format: date }
        steps: { type: integer }
        stepGoal: { type: integer }
        caloriesBurned: { type: integer }
        goalCompleted: { type: boolean }

    StepTrackingSyncRequest:
      type: object
      properties:
        steps: { type: integer }
        stepGoal: { type: integer }
        goalCompleted: { type: boolean }

    # ========== NEW FEATURE SCHEMAS ==========

    ExerciseSubstitutionRequestDTO:
      type: object
      properties:
        exerciseName: { type: string }
        muscleGroup: { type: string }
        reason: { type: string, enum: [EQUIPMENT, INJURY, PREFERENCE] }
        availableEquipment:
          type: array
          items: { type: string }
        injuredBodyParts:
          type: array
          items: { type: string }

    ExerciseSubstitutionResponseDTO:
      type: object
      properties:
        originalExercise: { type: string }
        alternatives:
          type: array
          items:
            type: object
        fromAi: { type: boolean }

    WorkoutFeedbackRequest:
      type: object
      properties:
        difficulty: { type: string, enum: [TOO_EASY, JUST_RIGHT, TOO_HARD] }
        energyLevel: { type: integer }
        completionPercentage: { type: integer }
        notes: { type: string }

    WorkoutFeedbackDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        difficulty: { type: string }
        energyLevel: { type: integer }
        completionPercentage: { type: integer }
        notes: { type: string }
        createdAt: { type: string, format: date-time }

    WorkoutAdjustmentResponseDTO:
      type: object
      properties:
        adjustedExercises:
          type: array
          items:
            type: object
        reasoning: { type: string }
        fromAi: { type: boolean }

    CustomWorkoutPlanRequest:
      type: object
      properties:
        planName: { type: string }
        planType: { type: string }
        daysPerWeek: { type: integer }
        restDay: { type: string, description: 'Day of the week for rest, e.g. SUNDAY' }
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/CustomExerciseEntry'

    CustomExerciseEntry:
      type: object
      properties:
        exerciseName: { type: string }
        sets: { type: integer }
        reps: { type: integer }
        weight: { type: number, format: double }
        muscleGroup: { type: string }
        isCardio: { type: boolean }
        durationSeconds: { type: integer }
        restTimeSeconds: { type: integer }
        dayOfWeek: { type: string }
        order: { type: integer }
        caloriesBurned: { type: integer }
        setDetailsJson: { type: string, description: 'JSON array of per-set details, e.g. [{"reps":12,"weight":50},{"reps":10,"weight":55}]' }

    CustomWorkoutLogSyncRequest:
      type: object
      properties:
        date: { type: string, format: date }
        logs:
          type: object
          additionalProperties:
            type: object

    UpdateExerciseRequest:
      type: object
      properties:
        sets: { type: integer }
        reps: { type: integer }
        weight: { type: number, format: double }
        restTimeSeconds: { type: integer }
        setDetailsJson: { type: string, description: 'JSON array of per-set details' }

    CustomWorkoutLogDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        userEmail: { type: string }
        logDate: { type: string, format: date }
        dayOfWeek: { type: string }
        exerciseIndex: { type: integer }
        exerciseName: { type: string }
        setsData: { type: string }
        completedAt: { type: string, format: date-time }

