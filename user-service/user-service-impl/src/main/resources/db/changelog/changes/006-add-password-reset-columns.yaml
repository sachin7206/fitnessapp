databaseChangeLog:
  - changeSet:
      id: 006-add-password-reset-columns
      author: fitnessapp
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: password_reset_token
                  type: VARCHAR(255)
              - column:
                  name: password_reset_expiry
                  type: TIMESTAMP

