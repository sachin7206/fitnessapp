databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: fitnessapp
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(255)
              - column:
                  name: last_name
                  type: VARCHAR(255)
              - column:
                  name: age
                  type: INT
              - column:
                  name: gender
                  type: VARCHAR(50)
              - column:
                  name: phone
                  type: VARCHAR(50)
              - column:
                  name: language
                  type: VARCHAR(10)
              - column:
                  name: region
                  type: VARCHAR(50)
              - column:
                  name: avatar_url
                  type: VARCHAR(500)
              - column:
                  name: height
                  type: DOUBLE
              - column:
                  name: current_weight
                  type: DOUBLE
              - column:
                  name: target_weight
                  type: DOUBLE
              - column:
                  name: activity_level
                  type: VARCHAR(50)
              - column:
                  name: created_at
                  type: DATETIME
              - column:
                  name: updated_at
                  type: DATETIME

