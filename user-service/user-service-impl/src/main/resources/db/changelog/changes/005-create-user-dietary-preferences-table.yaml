databaseChangeLog:
  - changeSet:
      id: 005-create-user-dietary-preferences-table
      author: fitnessapp
      changes:
        - createTable:
            tableName: user_dietary_preferences
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: preference
                  type: VARCHAR(255)
        - addForeignKeyConstraint:
            baseTableName: user_dietary_preferences
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_dietary_prefs_user

