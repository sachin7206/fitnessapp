databaseChangeLog:
  - changeSet:
      id: 002-create-user-goals-table
      author: fitnessapp
      changes:
        - createTable:
            tableName: user_goals
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: goal
                  type: VARCHAR(255)
        - addForeignKeyConstraint:
            baseTableName: user_goals
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_goals_user

