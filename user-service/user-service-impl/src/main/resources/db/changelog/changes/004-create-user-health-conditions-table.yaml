databaseChangeLog:
  - changeSet:
      id: 004-create-user-health-conditions-table
      author: fitnessapp
      changes:
        - createTable:
            tableName: user_health_conditions
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: condition_name
                  type: VARCHAR(255)
        - addForeignKeyConstraint:
            baseTableName: user_health_conditions
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_health_conditions_user

