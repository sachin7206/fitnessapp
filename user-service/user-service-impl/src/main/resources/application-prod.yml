# Production profile - Cloud deployment
server:
  port: ${PORT:8081}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/fitnessapp_users?useSSL=true&requireSSL=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

app:
  password-reset:
    base-url: ${APP_BASE_URL:https://fitnessapp.onrender.com}

jwt:
  secret: ${JWT_SECRET}

eureka:
  client:
    enabled: false

logging:
  level:
    root: INFO
    com.fitnessapp: INFO

