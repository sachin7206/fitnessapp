openapi: 3.0.3
info:
  title: User Service API
  description: API for authentication, user profiles, health metrics, and goals
  version: 1.0.0

paths:
  /auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthResponse'

  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Refresh access token
      parameters:
        - name: Refresh-Token
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthResponse'

  /auth/forgot-password:
    post:
      tags: [Auth]
      operationId: forgotPassword
      summary: Send password reset OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'

  /auth/reset-password:
    post:
      tags: [Auth]
      operationId: resetPassword
      summary: Reset password with OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Logout
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'

  /users/profile:
    get:
      tags: [User]
      operationId: getProfile
      summary: Get current user profile
      responses:
        '200':
          description: Profile retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserDto'
    put:
      tags: [User]
      operationId: updateProfile
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserDto'

  /users/health-metrics:
    put:
      tags: [User]
      operationId: updateHealthMetrics
      summary: Update health metrics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHealthMetricsRequest'
      responses:
        '200':
          description: Health metrics updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserDto'

  /users/goals:
    put:
      tags: [User]
      operationId: updateGoals
      summary: Update user goals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
      responses:
        '200':
          description: Goals updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserDto'

  /internal/users/by-email:
    get:
      tags: [InternalUser]
      operationId: getUserByEmail
      summary: Get user by email (internal)
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'

  /internal/users/{email}/profile-completion:
    get:
      tags: [InternalUser]
      operationId: getProfileCompletion
      summary: Get profile completion status (internal)
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Profile completion status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileCompletionStatusDTO'

  /internal/users/{email}/profile-complete-for-nutrition:
    get:
      tags: [InternalUser]
      operationId: isProfileCompleteForNutrition
      summary: Check if profile is complete for nutrition (internal)
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Boolean result
          content:
            application/json:
              schema:
                type: boolean

  /health:
    get:
      tags: [Health]
      operationId: healthCheck
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object

components:
  schemas:
    RegisterRequest:
      type: object
      x-mapped-type: com.fitnessapp.user.common.dto.RegisterRequest
      properties:
        email:
          type: string
    LoginRequest:
      type: object
      x-mapped-type: com.fitnessapp.user.common.dto.LoginRequest
      properties:
        email:
          type: string
    ForgotPasswordRequest:
      type: object
      x-mapped-type: com.fitnessapp.user.common.dto.ForgotPasswordRequest
      properties:
        email:
          type: string
    ResetPasswordRequest:
      type: object
      x-mapped-type: com.fitnessapp.user.common.dto.ResetPasswordRequest
      properties:
        email:
          type: string
    UserDto:
      type: object
      x-mapped-type: com.fitnessapp.user.common.dto.UserDto
      properties:
        id:
          type: integer
          format: int64
    AuthResponse:
      type: object
      x-mapped-type: com.fitnessapp.user.common.dto.AuthResponse
      properties:
        accessToken:
          type: string
    UpdateProfileRequest:
      type: object
      x-mapped-type: com.fitnessapp.user.common.dto.UpdateProfileRequest
      properties:
        firstName:
          type: string
    UpdateHealthMetricsRequest:
      type: object
      x-mapped-type: com.fitnessapp.user.common.dto.UpdateHealthMetricsRequest
      properties:
        height:
          type: number
    ProfileCompletionStatusDTO:
      type: object
      x-mapped-type: com.fitnessapp.user.common.dto.ProfileCompletionStatusDTO
      properties:
        isComplete:
          type: boolean
    ApiResponseAuthResponse:
      type: object
      x-mapped-type: com.fitnessapp.common.dto.ApiResponse
      properties:
        success:
          type: boolean
    ApiResponseUserDto:
      type: object
      x-mapped-type: com.fitnessapp.common.dto.ApiResponse
      properties:
        success:
          type: boolean
    ApiResponseVoid:
      type: object
      x-mapped-type: com.fitnessapp.common.dto.ApiResponse
      properties:
        success:
          type: boolean
