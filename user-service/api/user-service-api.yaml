openapi: 3.0.3
info:
  title: User Service API
  description: API for authentication, user profiles, health metrics, and goals
  version: 1.0.0

paths:
  /auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseWrapper'

  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseWrapper'

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Refresh access token
      parameters:
        - name: Refresh-Token
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseWrapper'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Logout
      responses:
        '200':
          description: Logout successful

  /users/profile:
    get:
      tags: [User]
      operationId: getProfile
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDtoWrapper'
    put:
      tags: [User]
      operationId: updateProfile
      summary: Update user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDtoWrapper'

  /users/health-metrics:
    put:
      tags: [User]
      operationId: updateHealthMetrics
      summary: Update health metrics
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHealthMetricsRequest'
      responses:
        '200':
          description: Health metrics updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDtoWrapper'

  /users/goals:
    put:
      tags: [User]
      operationId: updateGoals
      summary: Update user goals
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
      responses:
        '200':
          description: Goals updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDtoWrapper'

  /internal/users/by-email:
    get:
      tags: [InternalUser]
      operationId: getUserByEmail
      summary: Get user by email (internal)
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'

  /internal/users/{email}/profile-completion:
    get:
      tags: [InternalUser]
      operationId: getProfileCompletion
      summary: Get profile completion status (internal)
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Profile completion status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileCompletionStatusDTO'

  /internal/users/{email}/profile-complete-for-nutrition:
    get:
      tags: [InternalUser]
      operationId: isProfileCompleteForNutrition
      summary: Check if profile is complete for nutrition (internal)
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Boolean result
          content:
            application/json:
              schema:
                type: boolean

  /health:
    get:
      tags: [Health]
      operationId: healthCheck
      summary: Health check
      responses:
        '200':
          description: Service is healthy

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        language:
          type: string
          default: en
        region:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    UserDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        profile:
          $ref: '#/components/schemas/ProfileDto'
        healthMetrics:
          $ref: '#/components/schemas/HealthMetricsDto'
        goals:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    ProfileDto:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        age:
          type: integer
        gender:
          type: string
        phone:
          type: string
        language:
          type: string
        region:
          type: string
        avatarUrl:
          type: string

    HealthMetricsDto:
      type: object
      properties:
        height:
          type: number
          format: double
        currentWeight:
          type: number
          format: double
        targetWeight:
          type: number
          format: double
        activityLevel:
          type: string
        healthConditions:
          type: array
          items:
            type: string
        dietaryPreferences:
          type: array
          items:
            type: string

    UpdateProfileRequest:
      type: object
      properties:
        profile:
          $ref: '#/components/schemas/ProfileData'
        healthMetrics:
          $ref: '#/components/schemas/HealthMetricsData'
        goals:
          type: array
          items:
            type: string
        firstName:
          type: string
        lastName:
          type: string
        age:
          type: integer
        gender:
          type: string
        phone:
          type: string
        language:
          type: string
        region:
          type: string

    ProfileData:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        age:
          type: integer
        gender:
          type: string
        phone:
          type: string
        language:
          type: string
        region:
          type: string
        avatarUrl:
          type: string

    HealthMetricsData:
      type: object
      properties:
        height:
          type: number
          format: double
        currentWeight:
          type: number
          format: double
        targetWeight:
          type: number
          format: double
        activityLevel:
          type: string
        healthConditions:
          type: array
          items:
            type: string
        dietaryPreferences:
          type: array
          items:
            type: string

    UpdateHealthMetricsRequest:
      type: object
      properties:
        height:
          type: number
          format: double
        currentWeight:
          type: number
          format: double
        targetWeight:
          type: number
          format: double
        activityLevel:
          type: string
        healthConditions:
          type: array
          items:
            type: string
        dietaryPreferences:
          type: array
          items:
            type: string

    ProfileCompletionStatusDTO:
      type: object
      properties:
        isComplete:
          type: boolean
        hasPersonalInfo:
          type: boolean
        hasHealthMetrics:
          type: boolean
        hasGoals:
          type: boolean
        hasDietaryPreference:
          type: boolean
        missingFields:
          type: array
          items:
            type: string
        completionPercentage:
          type: integer

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          default: Bearer
        user:
          $ref: '#/components/schemas/UserDto'

    AuthResponseWrapper:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/AuthResponse'
        timestamp:
          type: string
          format: date-time

    UserDtoWrapper:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/UserDto'
        timestamp:
          type: string
          format: date-time

