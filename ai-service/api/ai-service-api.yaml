openapi: 3.0.3
info:
  title: AI Service API
  description: Centralized AI service for generating nutrition plans, workout plans, wellness plans, and text via Google Gemini
  version: 1.0.0

paths:
  /ai/nutrition/generate-plan:
    post:
      tags: [AiNutrition]
      operationId: generateNutritionPlan
      summary: Generate an AI-based nutrition meal plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiNutritionPlanRequest'
      responses:
        '200':
          description: AI-generated nutrition plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiNutritionPlanResponse'

  /ai/nutrition/estimate-macros:
    post:
      tags: [AiNutrition]
      operationId: estimateFoodMacros
      summary: Estimate macros for a food description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiEstimateMacrosRequest'
      responses:
        '200':
          description: Estimated macros
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiEstimateMacrosResponse'

  /ai/workout/generate-plan:
    post:
      tags: [AiWorkout]
      operationId: generateWorkoutPlan
      summary: Generate an AI-based workout plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiWorkoutPlanRequest'
      responses:
        '200':
          description: AI-generated workout plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiWorkoutPlanResponse'

  /ai/workout/motivational-quote:
    get:
      tags: [AiWorkout]
      operationId: getMotivationalQuote
      summary: Generate a motivational workout quote
      responses:
        '200':
          description: Motivational quote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiMotivationalQuoteResponse'

  /ai/wellness/generate-plan:
    post:
      tags: [AiWellness]
      operationId: generateWellnessPlan
      summary: Generate an AI-based wellness plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiWellnessPlanRequest'
      responses:
        '200':
          description: AI-generated wellness plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiWellnessPlanResponse'

  /ai/text/generate:
    post:
      tags: [AiText]
      operationId: generateText
      summary: Generate text from a custom prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiTextRequest'
      responses:
        '200':
          description: Generated text
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiTextResponse'

  /ai/health:
    get:
      tags: [Health]
      operationId: healthCheck
      summary: AI service health check
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object

  # ========== NEW FEATURE ENDPOINTS ==========

  /ai/nutrition/analyze-food-photo:
    post:
      tags: [AiNutrition]
      operationId: analyzeFoodPhoto
      summary: Analyze food photo to estimate calories and macros
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiFoodPhotoAnalysisRequest'
      responses:
        '200':
          description: Food photo analysis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiFoodPhotoAnalysisResponse'

  /ai/nutrition/suggest-meal-swap:
    post:
      tags: [AiNutrition]
      operationId: suggestMealSwap
      summary: Suggest meal alternatives with matching macros
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiMealSwapRequest'
      responses:
        '200':
          description: Meal swap suggestions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiMealSwapResponse'

  /ai/nutrition/generate-grocery-list:
    post:
      tags: [AiNutrition]
      operationId: generateGroceryList
      summary: Generate grocery list from meal plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiGroceryListRequest'
      responses:
        '200':
          description: Grocery list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiGroceryListResponse'

  /ai/workout/suggest-substitutes:
    post:
      tags: [AiWorkout]
      operationId: suggestExerciseSubstitutes
      summary: Suggest exercise substitutions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiExerciseSubstitutionRequest'
      responses:
        '200':
          description: Exercise alternatives
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiExerciseSubstitutionResponse'

  /ai/workout/adjust-progression:
    post:
      tags: [AiWorkout]
      operationId: adjustWorkoutProgression
      summary: Adjust workout intensity based on feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiWorkoutAdjustRequest'
      responses:
        '200':
          description: Adjusted workout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiWorkoutAdjustResponse'

  /ai/progress/weekly-report:
    post:
      tags: [AiProgress]
      operationId: generateWeeklyReport
      summary: Generate weekly progress report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiWeeklyReportRequest'
      responses:
        '200':
          description: Weekly report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiWeeklyReportResponse'

  /ai/progress/detect-plateau:
    post:
      tags: [AiProgress]
      operationId: detectPlateau
      summary: Detect fitness plateau
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiPlateauDetectionRequest'
      responses:
        '200':
          description: Plateau analysis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiPlateauDetectionResponse'

  /ai/wellness/rest-day-analysis:
    post:
      tags: [AiWellness]
      operationId: analyzeRestDay
      summary: Analyze if user needs a rest day
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiRestDayRequest'
      responses:
        '200':
          description: Rest day recommendation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiRestDayResponse'

components:
  schemas:
    AiNutritionPlanRequest:
      type: object
      properties:
        dietType: { type: string }
        goal: { type: string }
        targetCalories: { type: integer }
        region: { type: string }
        age: { type: integer }
        gender: { type: string }
        weight: { type: number, format: double }
        height: { type: number, format: double }
        mealSlots:
          type: array
          items:
            $ref: '#/components/schemas/MealSlot'
        foodPreferences:
          $ref: '#/components/schemas/FoodPrefs'

    MealSlot:
      type: object
      properties:
        name: { type: string }
        type: { type: string }
        time: { type: string }

    FoodPrefs:
      type: object
      properties:
        includeChicken: { type: boolean }
        includeFish: { type: boolean }
        includeRedMeat: { type: boolean }
        eggsPerDay: { type: integer }
        includeRice: { type: boolean }
        includeRoti: { type: boolean }
        includeDal: { type: boolean }
        includeMilk: { type: boolean }
        includePaneer: { type: boolean }
        includeCurd: { type: boolean }
        allergies:
          type: array
          items: { type: string }
        dislikedFoods:
          type: array
          items: { type: string }
        cookingOilPreference: { type: string }
        preferHomemade: { type: boolean }

    AiNutritionPlanResponse:
      type: object
      properties:
        meals:
          type: array
          items:
            $ref: '#/components/schemas/AiMeal'

    AiMeal:
      type: object
      properties:
        name: { type: string }
        mealType: { type: string }
        timeOfDay: { type: string }
        calories: { type: integer }
        preparationTips: { type: string }
        foodItems:
          type: array
          items:
            $ref: '#/components/schemas/AiFoodItem'

    AiFoodItem:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        quantity: { type: string }
        region: { type: string }
        calories: { type: integer }
        proteinGrams: { type: number, format: double }
        carbsGrams: { type: number, format: double }
        fatGrams: { type: number, format: double }
        fiberGrams: { type: number, format: double }
        isVegetarian: { type: boolean }

    AiEstimateMacrosRequest:
      type: object
      properties:
        foodDescription: { type: string }

    AiEstimateMacrosResponse:
      type: object
      properties:
        name: { type: string }
        calories: { type: integer }
        proteinGrams: { type: number, format: double }
        carbsGrams: { type: number, format: double }
        fatGrams: { type: number, format: double }

    AiWorkoutPlanRequest:
      type: object
      properties:
        daysPerWeek: { type: integer }
        exerciseType: { type: string }
        exerciseTime: { type: string }
        durationMinutes: { type: integer }
        goal: { type: string }
        difficulty: { type: string }
        includeCardio: { type: boolean }
        cardioType: { type: string }
        cardioDurationMinutes: { type: integer }
        cardioSteps: { type: integer }
        focusMuscleGroups:
          type: array
          items: { type: string }

    AiWorkoutPlanResponse:
      type: object
      properties:
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/AiExercise'

    AiExercise:
      type: object
      properties:
        exerciseName: { type: string }
        sets: { type: integer }
        reps: { type: integer }
        durationSeconds: { type: integer }
        restTimeSeconds: { type: integer }
        dayOfWeek: { type: string }
        muscleGroup: { type: string }
        caloriesBurned: { type: integer }
        isCardio: { type: boolean }
        steps: { type: integer }
        order: { type: integer }

    AiMotivationalQuoteResponse:
      type: object
      properties:
        quote: { type: string }
        fromAi: { type: boolean }

    AiWellnessPlanRequest:
      type: object
      properties:
        type: { type: string }
        level: { type: string }
        durationWeeks: { type: integer }
        sessionsPerWeek: { type: integer }
        sessionDurationMinutes: { type: integer }
        focusAreas:
          type: array
          items: { type: string }

    AiWellnessPlanResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/AiWellnessSession'

    AiWellnessSession:
      type: object
      properties:
        dayOfWeek: { type: string }
        sessionType: { type: string }
        sessionName: { type: string }
        description: { type: string }
        durationMinutes: { type: integer }
        caloriesBurned: { type: integer }
        poses:
          type: array
          items: { type: string }
        steps:
          type: array
          items: { type: string }

    AiTextRequest:
      type: object
      properties:
        prompt: { type: string }
        jsonResponse: { type: boolean }

    AiTextResponse:
      type: object
      properties:
        text: { type: string }
        fromAi: { type: boolean }

    # ========== NEW FEATURE DTOs ==========

    AiFoodPhotoAnalysisRequest:
      type: object
      properties:
        imageBase64: { type: string }
        description: { type: string }

    AiFoodPhotoAnalysisResponse:
      type: object
      properties:
        foodItems:
          type: array
          items:
            $ref: '#/components/schemas/RecognizedFoodItem'
        totalCalories: { type: integer }
        totalProtein: { type: number, format: double }
        totalCarbs: { type: number, format: double }
        totalFat: { type: number, format: double }
        confidence: { type: number, format: double }
        fromAi: { type: boolean }

    RecognizedFoodItem:
      type: object
      properties:
        name: { type: string }
        quantity: { type: string }
        calories: { type: integer }
        proteinGrams: { type: number, format: double }
        carbsGrams: { type: number, format: double }
        fatGrams: { type: number, format: double }

    AiExerciseSubstitutionRequest:
      type: object
      properties:
        exerciseName: { type: string }
        muscleGroup: { type: string }
        reason: { type: string, enum: [EQUIPMENT, INJURY, PREFERENCE] }
        availableEquipment:
          type: array
          items: { type: string }
        injuredBodyParts:
          type: array
          items: { type: string }

    AiExerciseSubstitutionResponse:
      type: object
      properties:
        alternatives:
          type: array
          items:
            $ref: '#/components/schemas/ExerciseAlternative'
        fromAi: { type: boolean }

    ExerciseAlternative:
      type: object
      properties:
        exerciseName: { type: string }
        muscleGroup: { type: string }
        sets: { type: integer }
        reps: { type: integer }
        reason: { type: string }
        equipmentNeeded: { type: string }
        difficultyLevel: { type: string }

    AiWeeklyReportRequest:
      type: object
      properties:
        userName: { type: string }
        weekStartDate: { type: string, format: date }
        weightEntries:
          type: array
          items:
            type: object
        workoutCompletions: { type: integer }
        totalWorkoutsPlanned: { type: integer }
        mealAdherencePercent: { type: number, format: double }
        totalSteps: { type: integer }
        caloriesConsumed: { type: integer }
        caloriesTarget: { type: integer }
        goals:
          type: array
          items: { type: string }

    AiWeeklyReportResponse:
      type: object
      properties:
        summary: { type: string }
        highlights:
          type: array
          items: { type: string }
        concerns:
          type: array
          items: { type: string }
        recommendations:
          type: array
          items: { type: string }
        overallScore: { type: integer }
        fromAi: { type: boolean }

    AiPlateauDetectionRequest:
      type: object
      properties:
        weightHistory:
          type: array
          items:
            type: object
        performanceHistory:
          type: array
          items:
            type: object
        currentGoal: { type: string }
        daysAnalyzed: { type: integer }

    AiPlateauDetectionResponse:
      type: object
      properties:
        isPlateauDetected: { type: boolean }
        plateauType: { type: string }
        durationWeeks: { type: integer }
        analysis: { type: string }
        suggestions:
          type: array
          items: { type: string }
        fromAi: { type: boolean }

    AiMealSwapRequest:
      type: object
      properties:
        originalMealName: { type: string }
        originalCalories: { type: integer }
        originalProtein: { type: number, format: double }
        originalCarbs: { type: number, format: double }
        originalFat: { type: number, format: double }
        mealType: { type: string }
        dietType: { type: string }
        region: { type: string }
        tolerancePercent: { type: integer, default: 5 }

    AiMealSwapResponse:
      type: object
      properties:
        alternatives:
          type: array
          items:
            $ref: '#/components/schemas/MealAlternative'
        fromAi: { type: boolean }

    MealAlternative:
      type: object
      properties:
        mealName: { type: string }
        description: { type: string }
        calories: { type: integer }
        proteinGrams: { type: number, format: double }
        carbsGrams: { type: number, format: double }
        fatGrams: { type: number, format: double }
        calorieDeviation: { type: number, format: double }
        foodItems:
          type: array
          items:
            $ref: '#/components/schemas/AiFoodItem'

    AiWorkoutAdjustRequest:
      type: object
      properties:
        currentExercises:
          type: array
          items:
            type: object
        feedbackHistory:
          type: array
          items:
            type: object
        goal: { type: string }
        currentWeek: { type: integer }

    AiWorkoutAdjustResponse:
      type: object
      properties:
        adjustedExercises:
          type: array
          items:
            $ref: '#/components/schemas/AdjustedExercise'
        reasoning: { type: string }
        fromAi: { type: boolean }

    AdjustedExercise:
      type: object
      properties:
        exerciseName: { type: string }
        previousSets: { type: integer }
        previousReps: { type: integer }
        newSets: { type: integer }
        newReps: { type: integer }
        changeReason: { type: string }

    AiRestDayRequest:
      type: object
      properties:
        recentWorkouts:
          type: array
          items:
            type: object
        muscleGroupsWorked:
          type: array
          items: { type: string }
        daysSinceLastRest: { type: integer }
        fitnessLevel: { type: string }

    AiRestDayResponse:
      type: object
      properties:
        shouldRest: { type: boolean }
        recommendation: { type: string }
        recoveryActivities:
          type: array
          items: { type: string }
        estimatedRecoveryHours: { type: integer }
        stretchingSuggestions:
          type: array
          items: { type: string }
        fromAi: { type: boolean }

    AiGroceryListRequest:
      type: object
      properties:
        meals:
          type: array
          items:
            type: object
        daysCount: { type: integer, default: 7 }
        region: { type: string }

    AiGroceryListResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/GroceryCategory'
        fromAi: { type: boolean }

    GroceryCategory:
      type: object
      properties:
        categoryName: { type: string }
        items:
          type: array
          items:
            $ref: '#/components/schemas/GroceryItem'

    GroceryItem:
      type: object
      properties:
        name: { type: string }
        quantity: { type: string }
        unit: { type: string }
        isOptional: { type: boolean }

