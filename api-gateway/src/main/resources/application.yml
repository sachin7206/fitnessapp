server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            exposedHeaders: "Authorization"
            allowCredentials: true
            maxAge: 3600
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s
        pool:
          type: DISABLED
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**, /api/users/**, /api/health
          filters:
            - StripPrefix=1

        - id: nutrition-service
          uri: lb://nutrition-service
          predicates:
            - Path=/api/nutrition/**
          filters:
            - StripPrefix=1

        - id: exercise-service
          uri: lb://exercise-service
          predicates:
            - Path=/api/exercises/**, /api/workouts/**
          filters:
            - StripPrefix=1

        - id: progress-service
          uri: lb://progress-service
          predicates:
            - Path=/api/progress/**
          filters:
            - StripPrefix=1

        - id: wellness-service
          uri: lb://wellness-service
          predicates:
            - Path=/api/wellness/**
          filters:
            - StripPrefix=1

        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=1

        - id: subscription-service
          uri: lb://subscription-service
          predicates:
            - Path=/api/subscriptions/**
          filters:
            - StripPrefix=1

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

  main:
    web-application-type: reactive

jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-env-variable}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: false

logging:
  level:
    root: INFO
    com.fitnessapp: DEBUG
    org.springframework.cloud.gateway: DEBUG

