openapi: 3.0.3
info:
  title: Nutrition Service API
  description: API for nutrition plans, meals, AI-generated plans, and food preferences
  version: 1.0.0

paths:
  /nutrition/plans:
    get:
      tags: [Nutrition]
      operationId: getAllPlans
      parameters:
        - name: region
          in: query
          schema: { type: string }
        - name: dietType
          in: query
          schema: { type: string }
        - name: goal
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Plans retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NutritionPlanDTO'

  /nutrition/plans/{id}:
    get:
      tags: [Nutrition]
      operationId: getPlanById
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Plan retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutritionPlanDTO'

  /nutrition/plans/recommended:
    get:
      tags: [Nutrition]
      operationId: getRecommendedPlans
      responses:
        '200':
          description: Recommended plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NutritionPlanDTO'

  /nutrition/plans/{planId}/enroll:
    post:
      tags: [Nutrition]
      operationId: enrollInPlan
      parameters:
        - name: planId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Enrolled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNutritionPlanDTO'

  /nutrition/generate-plan:
    post:
      tags: [Nutrition]
      operationId: generatePersonalizedPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateNutritionPlanRequest'
      responses:
        '200':
          description: Plan generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutritionPlanDTO'

  /nutrition/my-plan:
    get:
      tags: [Nutrition]
      operationId: getActivePlan
      responses:
        '200':
          description: Active plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNutritionPlanDTO'

  /nutrition/my-plans/history:
    get:
      tags: [Nutrition]
      operationId: getPlanHistory
      responses:
        '200':
          description: Plan history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserNutritionPlanDTO'

  /nutrition/my-plans/{userPlanId}/progress:
    put:
      tags: [Nutrition]
      operationId: updateProgress
      parameters:
        - name: userPlanId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Progress updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNutritionPlanDTO'

  /nutrition/my-plans/{userPlanId}:
    delete:
      tags: [Nutrition]
      operationId: cancelPlan
      parameters:
        - name: userPlanId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Plan cancelled

  /nutrition/food-preferences:
    get:
      tags: [Nutrition]
      operationId: getFoodPreferences
      responses:
        '200':
          description: Food preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFoodPreferenceDTO'
    post:
      tags: [Nutrition]
      operationId: saveFoodPreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserFoodPreferenceDTO'
      responses:
        '200':
          description: Preferences saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFoodPreferenceDTO'

  /nutrition/profile-status:
    get:
      tags: [Nutrition]
      operationId: checkProfileStatus
      responses:
        '200':
          description: Profile status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileCompletionStatusDTO'

  /nutrition/estimate-macros:
    post:
      tags: [Nutrition]
      operationId: estimateFoodMacros
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Estimated macros
          content:
            application/json:
              schema:
                type: object

  /nutrition/tracking/today:
    get:
      tags: [Nutrition]
      operationId: getTodayTracking
      responses:
        '200':
          description: Today tracking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyNutritionSummaryDTO'
    put:
      tags: [Nutrition]
      operationId: syncDailyTracking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DailyTrackingSyncRequest'
      responses:
        '200':
          description: Tracking synced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyNutritionSummaryDTO'

  /health:
    get:
      tags: [Health]
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object

components:
  schemas:
    NutritionPlanDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
    UserNutritionPlanDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
    GenerateNutritionPlanRequest:
      type: object
      properties:
        region: { type: string }
    UserFoodPreferenceDTO:
      type: object
      properties:
        region: { type: string }
    ProfileCompletionStatusDTO:
      type: object
      properties:
        isComplete: { type: boolean }
    DailyNutritionSummaryDTO:
      type: object
      properties:
        date: { type: string }
    DailyTrackingSyncRequest:
      type: object
      properties:
        date: { type: string }
