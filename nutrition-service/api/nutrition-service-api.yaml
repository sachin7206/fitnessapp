openapi: 3.0.3
info:
  title: Nutrition Service API
  description: API for nutrition plans, meals, AI-generated plans, and food preferences
  version: 1.0.0

paths:
  /nutrition/plans:
    get:
      tags: [Nutrition]
      operationId: getAllPlans
      parameters:
        - name: region
          in: query
          schema: { type: string }
        - name: dietType
          in: query
          schema: { type: string }
        - name: goal
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Plans retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NutritionPlanDTO'

  /nutrition/plans/{id}:
    get:
      tags: [Nutrition]
      operationId: getPlanById
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Plan retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutritionPlanDTO'

  /nutrition/plans/recommended:
    get:
      tags: [Nutrition]
      operationId: getRecommendedPlans
      responses:
        '200':
          description: Recommended plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NutritionPlanDTO'

  /nutrition/plans/{planId}/enroll:
    post:
      tags: [Nutrition]
      operationId: enrollInPlan
      parameters:
        - name: planId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Enrolled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNutritionPlanDTO'

  /nutrition/generate-plan:
    post:
      tags: [Nutrition]
      operationId: generatePersonalizedPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateNutritionPlanRequest'
      responses:
        '200':
          description: Plan generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutritionPlanDTO'

  /nutrition/my-plan:
    get:
      tags: [Nutrition]
      operationId: getActivePlan
      responses:
        '200':
          description: Active plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNutritionPlanDTO'

  /nutrition/my-plans/history:
    get:
      tags: [Nutrition]
      operationId: getPlanHistory
      responses:
        '200':
          description: Plan history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserNutritionPlanDTO'

  /nutrition/my-plans/{userPlanId}/progress:
    put:
      tags: [Nutrition]
      operationId: updateProgress
      parameters:
        - name: userPlanId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Progress updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNutritionPlanDTO'

  /nutrition/my-plans/{userPlanId}:
    delete:
      tags: [Nutrition]
      operationId: cancelPlan
      parameters:
        - name: userPlanId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Plan cancelled

  /nutrition/food-preferences:
    get:
      tags: [Nutrition]
      operationId: getFoodPreferences
      responses:
        '200':
          description: Food preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFoodPreferenceDTO'
    post:
      tags: [Nutrition]
      operationId: saveFoodPreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserFoodPreferenceDTO'
      responses:
        '200':
          description: Preferences saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFoodPreferenceDTO'

  /nutrition/profile-status:
    get:
      tags: [Nutrition]
      operationId: checkProfileStatus
      responses:
        '200':
          description: Profile status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileCompletionStatusDTO'

  /nutrition/estimate-macros:
    post:
      tags: [Nutrition]
      operationId: estimateFoodMacros
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Estimated macros
          content:
            application/json:
              schema:
                type: object

  /nutrition/tracking/today:
    get:
      tags: [Nutrition]
      operationId: getTodayTracking
      responses:
        '200':
          description: Today tracking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyNutritionSummaryDTO'
    put:
      tags: [Nutrition]
      operationId: syncDailyTracking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DailyTrackingSyncRequest'
      responses:
        '200':
          description: Tracking synced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyNutritionSummaryDTO'

  /health:
    get:
      tags: [Health]
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object

components:
  schemas:
    NutritionPlanDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        description: { type: string }
        region: { type: string }
        dietType: { type: string }
        goal: { type: string }
        totalCalories: { type: integer }
        proteinGrams: { type: number, format: double }
        carbsGrams: { type: number, format: double }
        fatGrams: { type: number, format: double }
        fiberGrams: { type: number, format: double }
        difficulty: { type: string }
        durationDays: { type: integer }
        meals:
          type: array
          items:
            $ref: '#/components/schemas/MealDTO'
        isActive: { type: boolean }

    MealDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        mealType: { type: string }
        timeOfDay: { type: string }
        dayNumber: { type: integer }
        calories: { type: integer }
        proteinGrams: { type: number, format: double }
        carbsGrams: { type: number, format: double }
        fatGrams: { type: number, format: double }
        foodItems:
          type: array
          items:
            $ref: '#/components/schemas/FoodItemDTO'
        preparationTips: { type: string }
        indianAlternatives: { type: string }

    FoodItemDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        hindiName: { type: string }
        regionalName: { type: string }
        description: { type: string }
        quantity: { type: string }
        calories: { type: integer }
        proteinGrams: { type: number, format: double }
        carbsGrams: { type: number, format: double }
        fatGrams: { type: number, format: double }
        fiberGrams: { type: number, format: double }
        ingredients: { type: string }
        recipe: { type: string }
        imageUrl: { type: string }
        isVegetarian: { type: boolean }
        isVegan: { type: boolean }
        isGlutenFree: { type: boolean }
        isDairyFree: { type: boolean }
        isJainFriendly: { type: boolean }
        region: { type: string }

    UserNutritionPlanDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        userId: { type: integer, format: int64 }
        nutritionPlan:
          $ref: '#/components/schemas/NutritionPlanDTO'
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        currentDay: { type: integer }
        status: { type: string }
        completedMeals: { type: integer }
        totalMeals: { type: integer }
        adherencePercentage: { type: number, format: double }
        notes: { type: string }
        enrolledAt: { type: string, format: date-time }
        scheduledForTomorrow: { type: boolean }

    GenerateNutritionPlanRequest:
      type: object
      properties:
        region: { type: string }
        primaryGoal: { type: string }
        targetCalories: { type: integer }
        excludeIngredients:
          type: array
          items: { type: string }
        customMeals:
          type: array
          items:
            $ref: '#/components/schemas/CustomMeal'
        includePreWorkoutMeal: { type: boolean }
        preWorkoutTime: { type: string }
        includePostWorkoutMeal: { type: boolean }
        postWorkoutTime: { type: string }
        canTakeWheyProtein: { type: boolean }
        supplements:
          type: array
          items: { type: string }
        foodPreferences:
          $ref: '#/components/schemas/FoodPreferences'

    CustomMeal:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        type: { type: string }
        time: { type: string }
        enabled: { type: boolean }

    FoodPreferences:
      type: object
      properties:
        includeChicken: { type: boolean }
        includeFish: { type: boolean }
        includeRedMeat: { type: boolean }
        eggsPerDay: { type: integer }
        includeRice: { type: boolean }
        includeRoti: { type: boolean }
        includeDal: { type: boolean }
        includeMilk: { type: boolean }
        includePaneer: { type: boolean }
        includeCurd: { type: boolean }
        allergies:
          type: array
          items: { type: string }
        dislikedFoods:
          type: array
          items: { type: string }
        cookingOilPreference: { type: string }
        preferHomemade: { type: boolean }

    DietaryRestriction:
      type: object
      properties:
        name: { type: string }
        severity: { type: string }

    UserFoodPreferenceDTO:
      type: object
      properties:
        includeChicken: { type: boolean }
        includeFish: { type: boolean }
        includeRedMeat: { type: boolean }
        eggsPerDay: { type: integer }
        includeRice: { type: boolean }
        includeRoti: { type: boolean }
        includeDal: { type: boolean }
        includeMilk: { type: boolean }
        includePaneer: { type: boolean }
        includeCurd: { type: boolean }
        cookingOilPreference: { type: string }
        preferHomemade: { type: boolean }
        allergies:
          type: array
          items: { type: string }
        dislikedFoods:
          type: array
          items: { type: string }
        customMeals:
          type: array
          items:
            type: object
        includePreWorkout: { type: boolean }
        preWorkoutTime: { type: string }
        includePostWorkout: { type: boolean }
        postWorkoutTime: { type: string }
        canTakeWheyProtein: { type: boolean }
        supplements:
          type: array
          items: { type: string }
        region: { type: string }

    ProfileCompletionStatusDTO:
      type: object
      properties:
        isComplete: { type: boolean }
        hasPersonalInfo: { type: boolean }
        hasHealthMetrics: { type: boolean }
        hasGoals: { type: boolean }
        hasDietaryPreference: { type: boolean }
        missingFields:
          type: array
          items: { type: string }
        completionPercentage: { type: integer }

    DailyNutritionSummaryDTO:
      type: object
      properties:
        trackingDate: { type: string, format: date }
        consumedCalories: { type: integer }
        consumedProtein: { type: number, format: double }
        consumedCarbs: { type: number, format: double }
        consumedFat: { type: number, format: double }
        totalMeals: { type: integer }
        completedMeals: { type: integer }
        meals:
          type: array
          items:
            $ref: '#/components/schemas/DailyMealTrackingDTO'

    DailyMealTrackingDTO:
      type: object
      properties:
        mealId: { type: integer, format: int64 }
        mealName: { type: string }
        mealType: { type: string }
        timeOfDay: { type: string }
        completed: { type: boolean }
        completedAt: { type: string }
        replaced: { type: boolean }
        replacedWith: { type: string }
        originalName: { type: string }
        calories: { type: integer }
        proteinGrams: { type: number, format: double }
        carbsGrams: { type: number, format: double }
        fatGrams: { type: number, format: double }

    MealCompletionRequest:
      type: object
      properties:
        mealId: { type: integer, format: int64 }
        mealName: { type: string }
        mealType: { type: string }
        timeOfDay: { type: string }
        completed: { type: boolean }
        completedAt: { type: string }
        replaced: { type: boolean }
        replacedWith: { type: string }
        originalName: { type: string }
        calories: { type: integer }
        proteinGrams: { type: number, format: double }
        carbsGrams: { type: number, format: double }
        fatGrams: { type: number, format: double }

    DailyTrackingSyncRequest:
      type: object
      properties:
        meals:
          type: array
          items:
            $ref: '#/components/schemas/MealCompletionRequest'
        consumedCalories: { type: integer }
        consumedProtein: { type: number, format: double }
        consumedCarbs: { type: number, format: double }
        consumedFat: { type: number, format: double }
