databaseChangeLog:
  - changeSet:
      id: 007-create-food-log-table
      author: fitnessapp
      changes:
        - createTable:
            tableName: food_log
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_email, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: log_date, type: DATE, constraints: { nullable: false } }
              - column: { name: meal_type, type: VARCHAR(50) }
              - column: { name: description, type: VARCHAR(500) }
              - column: { name: source, type: VARCHAR(20) }
              - column: { name: total_calories, type: INT, defaultValueNumeric: 0 }
              - column: { name: total_protein, type: DOUBLE, defaultValueNumeric: 0 }
              - column: { name: total_carbs, type: DOUBLE, defaultValueNumeric: 0 }
              - column: { name: total_fat, type: DOUBLE, defaultValueNumeric: 0 }
              - column: { name: confidence, type: DOUBLE, defaultValueNumeric: 0 }
              - column: { name: food_items_json, type: TEXT }
              - column: { name: created_at, type: DATETIME }
        - createIndex:
            tableName: food_log
            indexName: idx_food_log_user_date
            columns:
              - column: { name: user_email }
              - column: { name: log_date }

  - changeSet:
      id: 007-create-meal-swap-history-table
      author: fitnessapp
      changes:
        - createTable:
            tableName: meal_swap_history
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_email, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: plan_id, type: BIGINT }
              - column: { name: original_meal_id, type: BIGINT }
              - column: { name: original_meal_name, type: VARCHAR(255) }
              - column: { name: new_meal_name, type: VARCHAR(255) }
              - column: { name: original_calories, type: INT }
              - column: { name: new_calories, type: INT }
              - column: { name: swapped_at, type: DATETIME }

