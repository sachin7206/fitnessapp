databaseChangeLog:
  - changeSet:
      id: 001-create-nutrition-plans-table
      author: fitnessapp
      changes:
        - createTable:
            tableName: nutrition_plans
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: description, type: VARCHAR(1000) }
              - column: { name: region, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: diet_type, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: goal, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: total_calories, type: INT }
              - column: { name: protein_grams, type: DOUBLE }
              - column: { name: carbs_grams, type: DOUBLE }
              - column: { name: fat_grams, type: DOUBLE }
              - column: { name: fiber_grams, type: DOUBLE }
              - column: { name: difficulty, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: duration_days, type: INT }
              - column: { name: is_active, type: BOOLEAN, defaultValueBoolean: true }
              - column: { name: created_at, type: DATETIME }
              - column: { name: updated_at, type: DATETIME }

