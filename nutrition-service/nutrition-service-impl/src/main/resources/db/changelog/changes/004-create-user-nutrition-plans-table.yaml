databaseChangeLog:
  - changeSet:
      id: 004-create-user-nutrition-plans-table
      author: fitnessapp
      changes:
        - createTable:
            tableName: user_nutrition_plans
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: nutrition_plan_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: start_date, type: DATE }
              - column: { name: end_date, type: DATE }
              - column: { name: current_day, type: INT, defaultValueNumeric: 1 }
              - column: { name: status, type: VARCHAR(20), constraints: { nullable: false } }
              - column: { name: completed_meals, type: INT, defaultValueNumeric: 0 }
              - column: { name: total_meals, type: INT, defaultValueNumeric: 0 }
              - column: { name: adherence_percentage, type: DOUBLE, defaultValueNumeric: 0.0 }
              - column: { name: notes, type: VARCHAR(500) }
              - column: { name: enrolled_at, type: DATETIME }
        - addForeignKeyConstraint:
            baseTableName: user_nutrition_plans
            baseColumnNames: nutrition_plan_id
            referencedTableName: nutrition_plans
            referencedColumnNames: id
            constraintName: fk_user_nutrition_plans_plan

