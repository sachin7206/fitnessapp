server:
  port: 8088

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mysql://localhost:3306/fitnessapp_payments?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-env-variable}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: false

merchant:
  upi:
    id: ${MERCHANT_UPI_ID:fitnessapp@upi}
  name: ${MERCHANT_NAME:FitnessApp}

subscription:
  service:
    url: ${SUBSCRIPTION_SERVICE_URL:http://localhost:8087}

# Razorpay Payment Gateway
razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
  key-secret: ${RAZORPAY_KEY_SECRET:placeholder_secret}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

logging:
  level:
    root: INFO
    com.fitnessapp: DEBUG


