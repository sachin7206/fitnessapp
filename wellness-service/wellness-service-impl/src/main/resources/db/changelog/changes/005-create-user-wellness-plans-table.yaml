databaseChangeLog:
  - changeSet:
      id: 005-create-user-wellness-plans-table
      author: fitnessapp
      changes:
        - createTable:
            tableName: user_wellness_plans
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: user_email, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: plan_id, type: BIGINT }
              - column: { name: start_date, type: DATE }
              - column: { name: end_date, type: DATE }
              - column: { name: status, type: VARCHAR(20) }
              - column: { name: completed_sessions, type: INT, defaultValueNumeric: 0 }
              - column: { name: total_sessions, type: INT }
              - column: { name: created_at, type: DATETIME }
        - addForeignKeyConstraint:
            baseTableName: user_wellness_plans
            baseColumnNames: plan_id
            referencedTableName: wellness_plans
            referencedColumnNames: id
            constraintName: fk_user_wellness_plan

