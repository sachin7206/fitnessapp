databaseChangeLog:
  - changeSet:
      id: 003-create-breathing-exercises-table
      author: fitnessapp
      changes:
        - createTable:
            tableName: breathing_exercises
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: name, type: VARCHAR(200), constraints: { nullable: false } }
              - column: { name: technique, type: VARCHAR(50) }
              - column: { name: pattern, type: VARCHAR(50) }
              - column: { name: duration_minutes, type: INT }
              - column: { name: description, type: VARCHAR(1000) }
              - column: { name: benefits, type: VARCHAR(500) }
              - column: { name: difficulty, type: VARCHAR(20) }

