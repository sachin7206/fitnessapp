databaseChangeLog:
  - changeSet:
      id: 006-create-session-completions-table
      author: fitnessapp
      changes:
        - createTable:
            tableName: session_completions
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: user_email, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: session_type, type: VARCHAR(30) }
              - column: { name: session_id, type: BIGINT }
              - column: { name: duration_minutes, type: INT }
              - column: { name: completed_date, type: DATE }
              - column: { name: completed_at, type: DATETIME }

