openapi: 3.0.3
info:
  title: Wellness Service API
  version: 1.0.0
  description: API for yoga, meditation, breathing exercises and wellness plans

paths:
  /wellness/yoga/poses:
    get:
      operationId: getYogaPoses
      summary: List yoga poses
      tags: [Wellness]
      parameters:
        - name: difficulty
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Yoga poses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/YogaPoseDTO'

  /wellness/meditation/sessions:
    get:
      operationId: getMeditationSessions
      summary: List meditation sessions
      tags: [Wellness]
      parameters:
        - name: type
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Meditation sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MeditationSessionDTO'

  /wellness/breathing/exercises:
    get:
      operationId: getBreathingExercises
      summary: List breathing exercises
      tags: [Wellness]
      responses:
        '200':
          description: Breathing exercises
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BreathingExerciseDTO'

  /wellness/generate-plan:
    post:
      operationId: generatePlan
      summary: Generate AI wellness plan
      tags: [Wellness]
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Generated plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WellnessPlanDTO'

  /wellness/plans/{planId}/assign:
    post:
      operationId: assignPlan
      summary: Assign plan to user
      tags: [Wellness]
      parameters:
        - name: planId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Plan assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWellnessPlanDTO'

  /wellness/my-plan:
    get:
      operationId: getMyPlan
      summary: Get active wellness plan
      tags: [Wellness]
      responses:
        '200':
          description: Active plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWellnessPlanDTO'

  /wellness/my-plan/complete-session:
    post:
      operationId: completeSession
      summary: Mark session complete
      tags: [Wellness]
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Session completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWellnessPlanDTO'

  /wellness/tips/daily:
    get:
      operationId: getDailyTip
      summary: Get daily wellness tip
      tags: [Wellness]
      responses:
        '200':
          description: Daily tip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WellnessTipDTO'

  /wellness/streak:
    get:
      operationId: getStreak
      summary: Get wellness streak
      tags: [Wellness]
      responses:
        '200':
          description: Streak data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WellnessStreakDTO'

  /wellness/completions/today:
    get:
      operationId: getTodayCompletions
      summary: Get today completions
      tags: [Wellness]
      responses:
        '200':
          description: Today completions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /health:
    get:
      tags: [Health]
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object

components:
  schemas:
    YogaPoseDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        sanskritName: { type: string }
        description: { type: string }
        benefits: { type: string }
        difficulty: { type: string }
        durationSeconds: { type: integer }
        imageUrl: { type: string }
        category: { type: string }
        instructions: { type: string }

    MeditationSessionDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        type: { type: string }
        durationMinutes: { type: integer }
        description: { type: string }
        audioUrl: { type: string }
        difficulty: { type: string }
        benefits: { type: string }

    BreathingExerciseDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        technique: { type: string }
        pattern: { type: string }
        durationMinutes: { type: integer }
        description: { type: string }
        benefits: { type: string }
        difficulty: { type: string }

    WellnessSessionItemDTO:
      type: object
      properties:
        dayOfWeek: { type: string }
        sessionType: { type: string }
        sessionName: { type: string }
        durationMinutes: { type: integer }
        description: { type: string }
        caloriesBurned: { type: integer }

    WellnessPlanDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        planName: { type: string }
        type: { type: string }
        level: { type: string }
        durationWeeks: { type: integer }
        sessionsPerWeek: { type: integer }
        sessionDurationMinutes: { type: integer }
        description: { type: string }
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/WellnessSessionItemDTO'
        totalCaloriesBurned: { type: integer }

    UserWellnessPlanDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        userEmail: { type: string }
        wellnessPlan:
          $ref: '#/components/schemas/WellnessPlanDTO'
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        status: { type: string }
        completedSessions: { type: integer }
        totalSessions: { type: integer }
        scheduledForTomorrow: { type: boolean }

    WellnessTipDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        content: { type: string }
        category: { type: string }

    WellnessStreakDTO:
      type: object
      properties:
        currentStreak: { type: integer }
        longestStreak: { type: integer }
        totalSessionsCompleted: { type: integer }
        totalMinutes: { type: integer }
