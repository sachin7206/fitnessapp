openapi: 3.0.3
info:
  title: Progress Service API
  version: 1.0.0
  description: API for tracking fitness progress - weight, measurements, goals

paths:
  /progress/weight:
    post:
      operationId: logWeight
      summary: Log a weight entry
      tags: [Progress]
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Weight logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeightEntryDTO'
    get:
      operationId: getWeightEntries
      summary: Get weight history
      tags: [Progress]
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 90 }
      responses:
        '200':
          description: Weight entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WeightEntryDTO'

  /progress/measurements:
    post:
      operationId: logMeasurements
      summary: Log body measurements
      tags: [Progress]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BodyMeasurementDTO'
      responses:
        '200':
          description: Measurements logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BodyMeasurementDTO'
    get:
      operationId: getMeasurements
      summary: Get measurements history
      tags: [Progress]
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 90 }
      responses:
        '200':
          description: Measurements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BodyMeasurementDTO'

  /progress/goals:
    post:
      operationId: setGoal
      summary: Set a progress goal
      tags: [Progress]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgressGoalDTO'
      responses:
        '200':
          description: Goal set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressGoalDTO'
    get:
      operationId: getGoals
      summary: Get active goals
      tags: [Progress]
      responses:
        '200':
          description: Goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProgressGoalDTO'

  /progress/summary:
    get:
      operationId: getSummary
      summary: Get progress summary
      tags: [Progress]
      parameters:
        - name: period
          in: query
          schema: { type: string, default: monthly }
      responses:
        '200':
          description: Summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressSummaryDTO'

  /progress/trends:
    get:
      operationId: getTrends
      summary: Get trend data for charts
      tags: [Progress]
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 30 }
      responses:
        '200':
          description: Trends
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrendDataDTO'

  /health:
    get:
      tags: [Health]
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object

components:
  schemas:
    WeightEntryDTO:
      type: object
      properties:
        weight: { type: number, format: double }
    BodyMeasurementDTO:
      type: object
      properties:
        waist: { type: number, format: double }
    ProgressGoalDTO:
      type: object
      properties:
        goalType: { type: string }
    ProgressSummaryDTO:
      type: object
      properties:
        period: { type: string }
    TrendDataDTO:
      type: object
      properties:
        days: { type: integer }
