databaseChangeLog:
  - changeSet:
      id: 001-create-daily-progress-table
      author: fitnessapp
      changes:
        - createTable:
            tableName: daily_progress
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: entry_date, type: DATE, constraints: { nullable: false } }
              - column: { name: weight, type: DOUBLE }
              - column: { name: weight_unit, type: VARCHAR(10), defaultValue: kg }
              - column: { name: bmi, type: DOUBLE }
              - column: { name: body_fat_percentage, type: DOUBLE }
              - column: { name: muscle_mass, type: DOUBLE }
              - column: { name: photo_url, type: VARCHAR(500) }
              - column: { name: notes, type: VARCHAR(500) }
              - column: { name: created_at, type: DATETIME }
        - addUniqueConstraint:
            tableName: daily_progress
            columnNames: user_id, entry_date
            constraintName: uk_progress_user_date
  - changeSet:
      id: 002-create-body-measurements-table
      author: fitnessapp
      changes:
        - createTable:
            tableName: body_measurements
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: measurement_date, type: DATE, constraints: { nullable: false } }
              - column: { name: chest, type: DOUBLE }
              - column: { name: waist, type: DOUBLE }
              - column: { name: hips, type: DOUBLE }
              - column: { name: left_arm, type: DOUBLE }
              - column: { name: right_arm, type: DOUBLE }
              - column: { name: left_thigh, type: DOUBLE }
              - column: { name: right_thigh, type: DOUBLE }
              - column: { name: neck, type: DOUBLE }
              - column: { name: unit, type: VARCHAR(10), defaultValue: cm }
              - column: { name: created_at, type: DATETIME }
  - changeSet:
      id: 003-create-progress-goals-table
      author: fitnessapp
      changes:
        - createTable:
            tableName: progress_goals
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: goal_type, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: target_value, type: DOUBLE }
              - column: { name: current_value, type: DOUBLE }
              - column: { name: start_value, type: DOUBLE }
              - column: { name: start_date, type: DATE }
              - column: { name: target_date, type: DATE }
              - column: { name: unit, type: VARCHAR(20) }
              - column: { name: is_active, type: BOOLEAN, defaultValueBoolean: true }
              - column: { name: created_at, type: DATETIME }
              - column: { name: updated_at, type: DATETIME }
