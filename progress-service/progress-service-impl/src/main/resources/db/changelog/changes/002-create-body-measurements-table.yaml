databaseChangeLog:
  - changeSet:
      id: 002-create-body-measurements-table
      author: fitnessapp
      changes:
        - createTable:
            tableName: body_measurements
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: user_email, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: measurement_date, type: DATE, constraints: { nullable: false } }
              - column: { name: chest, type: DOUBLE }
              - column: { name: waist, type: DOUBLE }
              - column: { name: hips, type: DOUBLE }
              - column: { name: left_arm, type: DOUBLE }
              - column: { name: right_arm, type: DOUBLE }
              - column: { name: left_thigh, type: DOUBLE }
              - column: { name: right_thigh, type: DOUBLE }
              - column: { name: neck, type: DOUBLE }
              - column: { name: unit, type: VARCHAR(10), defaultValue: 'cm' }
              - column: { name: created_at, type: DATETIME }

