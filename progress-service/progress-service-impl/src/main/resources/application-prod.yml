# Production profile - Cloud deployment
server:
  port: ${PORT:8084}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/fitnessapp_progress?useSSL=true&requireSSL=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

jwt:
  secret: ${JWT_SECRET}

eureka:
  client:
    enabled: false

services:
  ai-service-url: ${AI_SERVICE_URL:http://localhost:8086}

logging:
  level:
    root: INFO
    com.fitnessapp: INFO

